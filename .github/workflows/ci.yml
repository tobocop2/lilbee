name: CI

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF"

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Type check
        run: make typecheck

      - name: Check imports resolve
        run: make imports-check

  test:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - name: Install dependencies
        run: uv sync
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_CUDA=OFF"

      - name: Run unit tests with coverage
        run: make test-ci
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

  integration:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_CUDA=OFF"

      - name: Install spacy model
        run: uv pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl

      - name: Install Playwright for crawl4ai
        run: uv run crawl4ai-setup
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8

      - name: Cache GGUF models (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/lilbee/models
          key: gguf-models-Linux-v3

      - name: Cache GGUF models (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/lilbee/models
          key: gguf-models-macOS-v3

      - name: Cache GGUF models (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\lilbee\models
          key: gguf-models-Windows-v3

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-models-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-${{ runner.os }}-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-qwen3-nomic-v1
          restore-keys: ollama-models-${{ runner.os }}-

      - name: Install Ollama (Linux)
        if: runner.os == 'Linux'
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Install Ollama (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL https://ollama.com/download/Ollama-darwin.zip -o /tmp/ollama.zip
          unzip -q /tmp/ollama.zip -d /tmp/ollama
          sudo mv /tmp/ollama/Ollama.app /Applications/
          sudo ln -sf /Applications/Ollama.app/Contents/Resources/ollama /usr/local/bin/ollama

      - name: Install Ollama (Windows)
        if: runner.os == 'Windows'
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://ollama.com/download/OllamaSetup.exe" -OutFile "$env:TEMP\OllamaSetup.exe" -TimeoutSec 600
          Start-Process "$env:TEMP\OllamaSetup.exe" -ArgumentList "/VERYSILENT","/NORESTART","/SP-" -Wait
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")
          ollama --version

      - name: Start Ollama and pull models (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          nohup ollama serve > /dev/null 2>&1 &
          sleep 3
          ollama pull qwen3:0.6b
          ollama pull nomic-embed-text

      - name: Start Ollama and pull models (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          start /b ollama serve
          timeout /t 5 /nobreak >nul
          ollama pull qwen3:0.6b
          ollama pull nomic-embed-text

      - name: Run all tests with optional deps
        run: make test-ci
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee
          LILBEE_LLM_PROVIDER: llama-cpp
          OLLAMA_HOST: http://localhost:11434

  deploy-pages:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF"

      - name: Build dev portal (coverage + API docs)
        run: make docs-site
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
