name: CI

on:
  pull_request:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF"

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Type check
        run: make typecheck

      - name: Check imports resolve
        run: make imports-check

  test:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - name: Install dependencies
        run: uv sync
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_CUDA=OFF"

      - name: Run unit tests with coverage
        run: make test-ci
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

  integration:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: /home/runner/work/_temp/setup-uv-cache
          key: uv-integration-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: uv-integration-

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_CUDA=OFF"

      - name: Install spacy model
        run: uv pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('uv.lock') }}
          restore-keys: playwright-

      - name: Install Playwright for crawl4ai
        run: uv run crawl4ai-setup
        continue-on-error: true

      - name: Cache GGUF models
        uses: actions/cache@v4
        with:
          path: ~/.local/share/lilbee/models
          key: gguf-models-v3
          restore-keys: gguf-models-

      - name: Cache sentence-transformers models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-

      - name: Pull Ollama models for litellm tests
        run: |
          curl -s http://localhost:11434/api/pull -d '{"name":"qwen3:0.6b"}' | tail -1
          curl -s http://localhost:11434/api/pull -d '{"name":"nomic-embed-text"}' | tail -1

      - name: Run all tests with optional deps
        run: uv run pytest --cov=lilbee --cov-report=term-missing -v -n auto
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee
          LILBEE_LLM_PROVIDER: llama-cpp
          OLLAMA_HOST: http://localhost:11434

  deploy-pages:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF"

      - name: Build dev portal (coverage + API docs)
        run: make docs-site
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
