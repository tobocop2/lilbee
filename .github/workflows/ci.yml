name: CI

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF"

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Type check
        run: make typecheck

      - name: Check imports resolve
        run: make imports-check

  test:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - name: Install dependencies
        run: uv sync
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_CUDA=OFF"

      - name: Run unit tests with coverage
        run: make test-ci
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

  integration:
    timeout-minutes: 90
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - name: Install OpenBLAS (Windows)
        if: runner.os == 'Windows'
        run: choco install openblas -y

      - name: Install OpenBLAS (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - name: Restore Ollama binary cache (Windows)
        if: runner.os == 'Windows'
        id: ollama-bin-cache
        uses: actions/cache/restore@v4
        with:
          path: C:\ollama
          key: ollama-bin-${{ runner.os }}-v1

      # llama-cpp build optimizations per platform:
      # - GGML_NATIVE=ON: AVX2 on x86 (Linux/Windows), NEON on ARM (macOS)
      # - GGML_BLAS=ON: OpenBLAS on Linux/Windows (3-5x prompt speedup)
      # - GGML_ACCELERATE: auto-enabled on macOS (Apple's native BLAS)
      # - GGML_METAL=OFF: GitHub macOS runners are VMs without GPU passthrough
      # - GGML_CPU_AARCH64=OFF: avoids i8mm instructions unsupported on CI M1
      # - GGML_CUDA=OFF: no NVIDIA GPU on CI runners
      - name: Install dependencies (Linux/Windows)
        if: runner.os != 'macOS'
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_NATIVE=ON -DGGML_CUDA=OFF -DGGML_BLAS=ON -DGGML_BLAS_VENDOR=OpenBLAS"

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_NATIVE=ON -DGGML_METAL=OFF -DGGML_CPU_AARCH64=OFF"

      - name: Install spacy model
        run: uv pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl

      - name: Restore Playwright cache
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright for crawl4ai
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: uv run crawl4ai-setup
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

      - name: Save Playwright cache
        if: steps.pw-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/.playwright-browsers
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Cache GGUF models (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/lilbee/models
          key: gguf-models-Linux-v3

      - name: Cache GGUF models (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/lilbee/models
          key: gguf-models-macOS-v3

      - name: Cache GGUF models (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\lilbee\models
          key: gguf-models-Windows-v3

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-models-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-${{ runner.os }}-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ runner.os }}-qwen3-nomic-v1
          restore-keys: ollama-models-${{ runner.os }}-

      - name: Install Ollama (Linux)
        if: runner.os == 'Linux'
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Install Ollama (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL https://ollama.com/download/Ollama-darwin.zip -o /tmp/ollama.zip
          unzip -q /tmp/ollama.zip -d /tmp/ollama
          sudo mv /tmp/ollama/Ollama.app /Applications/
          sudo ln -sf /Applications/Ollama.app/Contents/Resources/ollama /usr/local/bin/ollama

      - name: Install Ollama (Windows)
        if: runner.os == 'Windows' && steps.ollama-bin-cache.outputs.cache-hit != 'true'
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://ollama.com/download/ollama-windows-amd64.zip" -OutFile "$env:TEMP\ollama.zip"
          Expand-Archive "$env:TEMP\ollama.zip" -DestinationPath "C:\ollama" -Force

      - name: Save Ollama binary cache (Windows)
        if: runner.os == 'Windows' && steps.ollama-bin-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\ollama
          key: ollama-bin-${{ runner.os }}-v1

      - name: Start Ollama and pull models (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          nohup ollama serve > /dev/null 2>&1 &
          sleep 3
          ollama pull qwen3:0.6b
          ollama pull nomic-embed-text

      - name: Start Ollama and pull models (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          start /b C:\ollama\ollama.exe serve
          timeout /t 5 /nobreak >nul
          C:\ollama\ollama.exe pull qwen3:0.6b
          C:\ollama\ollama.exe pull nomic-embed-text

      - name: Run integration tests
        run: make test-integration
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee
          LILBEE_LLM_PROVIDER: llama-cpp
          OLLAMA_HOST: http://localhost:11434
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.playwright-browsers

  deploy-pages:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF"

      - name: Build dev portal (coverage + API docs)
        run: make docs-site
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
