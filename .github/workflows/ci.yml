name: CI

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF"

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Type check
        run: make typecheck

      - name: Check imports resolve
        run: make imports-check

  test:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - name: Install dependencies
        run: uv sync
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_CUDA=OFF"

      - name: Run unit tests with coverage
        run: make test-ci
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

  integration:
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF -DGGML_BLAS=OFF -DGGML_CUDA=OFF"

      - name: Install spacy model
        run: uv pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl

      - name: Install Playwright for crawl4ai
        run: uv run crawl4ai-setup
        continue-on-error: true

      - name: Cache GGUF models
        uses: actions/cache@v4
        with:
          path: ~/.local/share/lilbee/models
          key: gguf-models-${{ runner.os }}-v3
          restore-keys: gguf-models-${{ runner.os }}-

      - name: Cache sentence-transformers models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-models-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-${{ runner.os }}-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ollama_models
          key: ollama-models-${{ runner.os }}-qwen3-nomic-v1
          restore-keys: ollama-models-${{ runner.os }}-

      - name: Install Ollama (Linux/macOS)
        if: runner.os != 'Windows'
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Install Ollama (Windows)
        if: runner.os == 'Windows'
        run: choco install ollama -y

      - name: Start Ollama and pull models (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          OLLAMA_MODELS: ${{ runner.temp }}/ollama_models
        run: |
          ollama serve &
          sleep 2
          ollama pull qwen3:0.6b
          ollama pull nomic-embed-text

      - name: Start Ollama and pull models (Windows)
        if: runner.os == 'Windows'
        env:
          OLLAMA_MODELS: ${{ runner.temp }}/ollama_models
        run: |
          Start-Process ollama -ArgumentList "serve" -NoNewWindow
          Start-Sleep -Seconds 5
          ollama pull qwen3:0.6b
          ollama pull nomic-embed-text

      - name: Run all tests with optional deps
        run: make test-ci
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

      - name: Run integration tests
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee
          LILBEE_LLM_PROVIDER: llama-cpp
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODELS: ${{ runner.temp }}/ollama_models
        run: uv run pytest tests/integration/ -v

  deploy-pages:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: uv sync --all-extras
        env:
          CMAKE_ARGS: "-DGGML_METAL=OFF -DGGML_NATIVE=OFF"

      - name: Build dev portal (coverage + API docs)
        run: make docs-site
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
