name: Release Executables

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync
      - run: make lint
      - run: make format-check
      - run: make typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv python install 3.12
      - run: uv sync
      - run: make test-ci
        env:
          LILBEE_DATA: ${{ runner.temp }}/lilbee

  build:
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: lilbee-linux-x86_64
            pyinstaller: .venv/bin/pyinstaller
          - os: macos-latest
            asset_name: lilbee-macos-arm64
            pyinstaller: .venv/bin/pyinstaller
          - os: windows-latest
            asset_name: lilbee-windows-x86_64.exe
            pyinstaller: .venv/Scripts/pyinstaller.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv sync && uv pip install pyinstaller
          # python-multipart ships a multipart/ shim that shadows the real
          # multipart.py in PyInstaller builds. Remove it so litestar gets
          # the real module. We invoke pyinstaller via matrix.pyinstaller
          # (not `uv run`) so uv doesn't re-install it.
          uv pip uninstall python-multipart

      - name: Build executable
        run: >
          ${{ matrix.pyinstaller }}
          --onefile
          --name ${{ matrix.asset_name }}
          --copy-metadata lilbee
          --collect-all lancedb
          --collect-all tree_sitter_language_pack
          --collect-all tiktoken_ext
          --collect-all pypdfium2
          src/lilbee/__main__.py

      - name: Smoke test
        run: |
          ./dist/${{ matrix.asset_name }} --version
          ./dist/${{ matrix.asset_name }} --help
        shell: bash

      - name: Verify server starts
        # Catches the recurring python-multipart shadow import bug.
        # Poll until the server responds or the process dies.
        run: |
          export LILBEE_DATA="${{ runner.temp }}/lilbee-smoke"
          mkdir -p "$LILBEE_DATA"
          ./dist/${{ matrix.asset_name }} serve --port 9123 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "server process died"
              exit 1
            fi
            if curl -sf http://127.0.0.1:9123/api/health > /dev/null 2>&1; then
              echo "server responded on attempt $i"
              kill $SERVER_PID 2>/dev/null || true
              wait $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "server never responded after 30s"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        shell: bash

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
