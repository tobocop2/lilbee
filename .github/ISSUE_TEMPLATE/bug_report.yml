name: Bug Report
description: Report a bug in lilbee
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `lilbee sync`
        2. Run `lilbee ask "..."`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if applicable.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 14.2, Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      placeholder: "e.g., 3.11.7"
    validations:
      required: true

  - type: input
    id: ollama_version
    attributes:
      label: Ollama Version
      placeholder: "e.g., 0.5.4"
    validations:
      required: false

  - type: input
    id: lilbee_version
    attributes:
      label: lilbee Version
      placeholder: "e.g., 0.3.9"
    validations:
      required: true
